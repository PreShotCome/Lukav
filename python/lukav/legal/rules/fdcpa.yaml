# Fair Debt Collection Practices Act — 15 U.S.C. §1692 et seq.
#
# Most FDCPA rules need information Plaid does NOT expose (collector
# identity, call logs, written communications). Lukav captures this from
# the user via the "Manual debt context" form. The rules below run against
# the union of Plaid data + manual context.

rules:
  - rule_id: fdcpa.validation_opportunity
    title: Right to demand debt validation
    citation: 15 USC 1692g(b)
    severity: info
    description: >-
      Within 30 days of a collector's first written communication you may
      send a written request for validation. The collector must cease
      collection until validation is provided. Use validation_request.j2.

  - rule_id: fdcpa.time_barred_debt
    title: Debt may be past the statute of limitations
    citation: CFPB 12 CFR 1006.26
    severity: high
    description: >-
      A collector cannot sue or threaten suit on a debt past your state's
      statute of limitations, and certain communications about time-barred
      debt must include the CFPB-required disclosure.

  - rule_id: fdcpa.cease_contact
    title: Right to demand cease-of-contact
    citation: 15 USC 1692c(c)
    severity: info
    description: >-
      Consumers may demand a collector stop contacting them in writing.
      After receipt, the collector may only contact to confirm receipt or
      to notify of specific legal action.

  - rule_id: fdcpa.communication_outside_hours
    title: Communication outside permitted hours
    citation: 15 USC 1692c(a)(1)
    severity: high
    description: >-
      A debt collector may not communicate with a consumer at any unusual
      time or place, presumed inconvenient outside 8:00 AM to 9:00 PM at
      the consumer's location.

  - rule_id: fdcpa.third_party_disclosure
    title: Disclosure of debt to a third party
    citation: 15 USC 1692c(b)
    severity: high
    description: >-
      Except in limited circumstances, a debt collector may not
      communicate about a consumer's debt with anyone other than the
      consumer, their attorney, or a consumer reporting agency.

  - rule_id: fdcpa.workplace_communication
    title: Communication at the consumer's workplace
    citation: 15 USC 1692c(a)(3)
    severity: medium
    description: >-
      A debt collector may not contact a consumer at their place of
      employment if the collector knows or has reason to know that the
      employer prohibits such communication.

  - rule_id: fdcpa.harassment
    title: Harassment or abuse
    citation: 15 USC 1692d
    severity: high
    description: >-
      A debt collector may not engage in conduct the natural consequence
      of which is to harass, oppress, or abuse — including profane
      language and repeated calls intended to annoy.

  - rule_id: fdcpa.threat_on_time_barred
    title: Threat of action that cannot legally be taken
    citation: 15 USC 1692e(5)
    severity: high
    description: >-
      Threatening to take action (such as filing suit) that cannot
      legally be taken — for example, suing on a time-barred debt — is
      a false-representation violation.

  - rule_id: fdcpa.contact_after_cease
    title: Contact after a written cease demand
    citation: 15 USC 1692c(c)
    severity: high
    description: >-
      After receipt of a written cease-of-contact demand, the collector
      may only communicate to confirm receipt or to notify of specific
      action. Any other contact is a per-instance violation.

  - rule_id: fdcpa.reg_f_seven_in_seven_calls
    title: Reg F call-frequency cap exceeded (7-in-7)
    citation: 12 CFR 1006.14(b)(2)(i)
    severity: high
    description: >-
      Under CFPB Regulation F, a debt collector is presumed to violate
      §1692d if it places more than 7 telephone calls within a 7-day
      period regarding a particular debt.

  - rule_id: fdcpa.reg_f_seven_days_after_conversation
    title: Phone contact within 7 days of a prior telephone conversation
    citation: 12 CFR 1006.14(b)(2)(ii)
    severity: high
    description: >-
      Under Regulation F, a debt collector is presumed to violate §1692d
      if it speaks with the consumer by phone about a particular debt
      and then contacts the consumer by phone again within 7 days about
      that same debt.

  - rule_id: fdcpa.mini_miranda_required
    title: Mini-Miranda disclosure missing from initial communication
    citation: 15 USC 1692e(11)
    severity: medium
    description: >-
      The initial written communication and each subsequent
      communication must disclose that the collector is attempting to
      collect a debt and that any information will be used for that
      purpose. Omission is a §1692e(11) violation.
